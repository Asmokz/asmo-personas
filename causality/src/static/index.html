<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Causality</title>
<style>
:root {
  --bg:          #080808;
  --s1:          #0f0f0f;
  --s2:          #141414;
  --s3:          #1a1a1a;
  --border:      #1e1e1e;
  --border-2:    #282828;
  --red:         #e03030;
  --red-b:       #ff4444;
  --red-dim:     rgba(224,48,48,.1);
  --red-border:  rgba(224,48,48,.28);
  --text:        #d8d8d8;
  --muted:       #505050;
  --muted-2:     #383838;
  --green:       #22c55e;
  --amber:       #f59e0b;
  --blue:        #3b82f6;
  --cyan:        #06b6d4;
  --purple:      #8b5cf6;
  --font:        'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); font-size: 12px; line-height: 1.5; }

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--muted-2); border-radius: 2px; }

/* ── Header ── */
#header {
  position: sticky; top: 0; z-index: 100;
  background: var(--s1); border-bottom: 1px solid var(--border);
  padding: 0 16px;
  display: flex; align-items: center; gap: 16px; height: 48px;
}
#logo {
  font-size: 14px; font-weight: 700; letter-spacing: 3px;
  color: var(--red); text-transform: uppercase; white-space: nowrap;
  display: flex; align-items: center; gap: 8px;
}
#logo::before {
  content: ''; width: 8px; height: 8px;
  background: var(--red); border-radius: 50%;
  box-shadow: 0 0 8px var(--red);
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:.4; } }

.filters { display: flex; gap: 4px; }
.filter-btn {
  padding: 3px 10px; border-radius: 3px; cursor: pointer;
  border: 1px solid var(--border-2); background: transparent;
  color: var(--muted); font-family: var(--font); font-size: 11px;
  transition: all .15s;
}
.filter-btn:hover { color: var(--text); border-color: var(--muted-2); }
.filter-btn.active { color: var(--text); border-color: var(--red-border); background: var(--red-dim); }
.filter-btn[data-persona="alita"].active  { color: #f87171; border-color: rgba(248,113,113,.35); background: rgba(248,113,113,.08); }
.filter-btn[data-persona="femto"].active  { color: #60a5fa; border-color: rgba(96,165,250,.35); background: rgba(96,165,250,.08); }
.filter-btn[data-persona="giorgio"].active{ color: #a78bfa; border-color: rgba(167,139,250,.35); background: rgba(167,139,250,.08); }

#spacer { flex: 1; }

#refresh-ctrl { display: flex; align-items: center; gap: 8px; color: var(--muted); font-size: 11px; }
#refresh-btn {
  padding: 3px 8px; border-radius: 3px; cursor: pointer;
  border: 1px solid var(--border-2); background: transparent;
  color: var(--muted); font-family: var(--font); font-size: 11px;
  transition: all .15s;
}
#refresh-btn:hover { color: var(--text); border-color: var(--muted-2); }
#countdown { font-variant-numeric: tabular-nums; min-width: 20px; text-align: right; }
#count-badge {
  padding: 2px 7px; border-radius: 10px;
  background: var(--s3); color: var(--muted); font-size: 10px;
}

/* ── Table header ── */
#col-header {
  display: grid;
  grid-template-columns: 72px 88px 160px 64px 74px 96px 78px 72px 20px;
  padding: 6px 12px 6px 16px;
  border-bottom: 1px solid var(--border);
  color: var(--muted); font-size: 10px; letter-spacing: .8px; text-transform: uppercase;
  position: sticky; top: 48px; background: var(--s1); z-index: 99;
}

/* ── Exchange list ── */
#exchange-list { padding-bottom: 40px; }

.ex-row {
  display: grid;
  grid-template-columns: 72px 88px 160px 64px 74px 96px 78px 72px 20px;
  padding: 7px 12px 7px 16px;
  border-bottom: 1px solid var(--border);
  cursor: pointer; transition: background .1s;
  align-items: center;
}
.ex-row:hover { background: rgba(255,255,255,.02); }
.ex-row.expanded {
  background: var(--red-dim);
  border-left: 2px solid var(--red);
  padding-left: 14px;
}

.persona-badge {
  font-size: 10px; font-weight: 700; letter-spacing: 1px;
  padding: 2px 6px; border-radius: 2px; display: inline-block;
  text-transform: uppercase;
}
.persona-alita   { color: #f87171; border: 1px solid rgba(248,113,113,.3); background: rgba(248,113,113,.07); }
.persona-femto   { color: #60a5fa; border: 1px solid rgba(96,165,250,.3);  background: rgba(96,165,250,.07);  }
.persona-giorgio { color: #a78bfa; border: 1px solid rgba(167,139,250,.3); background: rgba(167,139,250,.07); }

.ex-time   { color: var(--muted); font-size: 11px; font-variant-numeric: tabular-nums; }
.ex-model  { color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; padding-right: 8px; }
.ex-dur    { font-variant-numeric: tabular-nums; }
.ex-toks   { color: var(--amber); font-variant-numeric: tabular-nums; }
.ex-gpu    { font-variant-numeric: tabular-nums; font-size: 11px; }
.ex-vram   { color: var(--muted); font-size: 11px; font-variant-numeric: tabular-nums; }
.ex-swap   { color: var(--muted); font-size: 11px; font-variant-numeric: tabular-nums; }
.ex-status { text-align: center; }
.dot-ok      { color: var(--green); }
.dot-pending { color: var(--amber); animation: blink 1s step-end infinite; }
.dot-error   { color: var(--red); }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

.na { color: var(--muted-2); }
.arrow { color: var(--muted-2); }
.val-up   { color: #f87171; }
.val-down { color: var(--green); }
.val-same { color: var(--muted); }

/* ── Detail panel ── */
.ex-detail {
  display: none;
  background: var(--s2);
  border-bottom: 1px solid var(--border);
  border-left: 2px solid var(--red-border);
  padding: 12px 16px 16px 14px;
}
.ex-detail.open { display: flex; gap: 16px; }

/* ── Conversation panel ── */
.conv-panel {
  flex: 1; min-width: 0;
  display: flex; flex-direction: column; gap: 2px;
  max-height: 420px; overflow-y: auto;
  padding-right: 4px;
}
.conv-label {
  font-size: 10px; color: var(--muted); letter-spacing: 1px;
  text-transform: uppercase; margin-bottom: 6px;
}

.msg {
  border-radius: 3px; padding: 6px 8px;
  border-left: 2px solid transparent;
  margin-bottom: 2px;
}
.msg-system    { background: rgba(80,80,80,.12);  border-color: #444; }
.msg-user      { background: rgba(59,130,246,.08); border-color: #3b82f6; }
.msg-assistant { background: rgba(34,197,94,.07); border-color: #22c55e; }
.msg-tool-call { background: rgba(245,158,11,.08); border-color: #f59e0b; }
.msg-tool      { background: rgba(6,182,212,.07);  border-color: #06b6d4; }

.msg-role {
  font-size: 9px; letter-spacing: 1.2px; text-transform: uppercase;
  color: var(--muted); margin-bottom: 3px; font-weight: 700;
}
.msg-system    .msg-role { color: #666; }
.msg-user      .msg-role { color: #60a5fa; }
.msg-assistant .msg-role { color: #4ade80; }
.msg-tool-call .msg-role { color: #fbbf24; }
.msg-tool      .msg-role { color: #22d3ee; }

.msg-content {
  color: var(--text); white-space: pre-wrap; word-break: break-word;
  font-size: 11px; line-height: 1.6;
}
.msg-system .msg-content { color: #888; }

.sys-toggle {
  font-size: 10px; color: var(--muted); cursor: pointer;
  background: none; border: none; font-family: var(--font);
  padding: 0; text-decoration: underline dotted;
}
.sys-toggle:hover { color: var(--text); }
.sys-body { display: none; }
.sys-body.visible { display: block; }

.tool-call-entry {
  padding: 4px 0; font-size: 11px;
}
.tc-name { color: #fbbf24; font-weight: 700; }
.tc-args { color: #888; margin-left: 8px; }

.tool-content {
  max-height: 120px; overflow-y: auto;
  color: #9ca3af; font-size: 10.5px;
}

/* ── Stats panel ── */
.stats-panel {
  width: 230px; flex-shrink: 0;
  display: flex; flex-direction: column; gap: 12px;
}
.stats-section { }
.stats-title {
  font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase;
  color: var(--muted); margin-bottom: 6px; border-bottom: 1px solid var(--border);
  padding-bottom: 3px;
}
.stat-row {
  display: flex; justify-content: space-between; align-items: baseline;
  padding: 2px 0; font-size: 11px;
}
.stat-label { color: var(--muted); }
.stat-value { font-variant-numeric: tabular-nums; color: var(--text); }
.stat-value.highlight { color: var(--amber); }

.hw-grid {
  display: grid; grid-template-columns: 1fr 52px 52px;
  gap: 2px; font-size: 11px;
}
.hw-header { color: var(--muted); font-size: 10px; text-align: right; padding-bottom: 2px; }
.hw-label { color: var(--muted); padding: 2px 0; }
.hw-val { text-align: right; font-variant-numeric: tabular-nums; padding: 2px 0; }

/* ── Empty / loading states ── */
#empty {
  text-align: center; padding: 60px 20px;
  color: var(--muted); font-size: 12px; display: none;
}
#loading {
  text-align: center; padding: 60px 20px;
  color: var(--muted); font-size: 12px;
}
</style>
</head>
<body>

<div id="header">
  <div id="logo">Causality</div>
  <div class="filters">
    <button class="filter-btn active" data-persona="" onclick="setFilter('')">Tout</button>
    <button class="filter-btn" data-persona="alita"   onclick="setFilter('alita')">Alita</button>
    <button class="filter-btn" data-persona="femto"   onclick="setFilter('femto')">Femto</button>
    <button class="filter-btn" data-persona="giorgio" onclick="setFilter('giorgio')">Giorgio</button>
  </div>
  <div id="spacer"></div>
  <span id="count-badge">— échanges</span>
  <div id="refresh-ctrl">
    <button id="refresh-btn" onclick="manualRefresh()">Actualiser</button>
    <span id="countdown">30s</span>
  </div>
</div>

<div id="col-header">
  <span>Persona</span><span>Heure</span><span>Modèle</span>
  <span>Durée</span><span>Tok/s</span><span>GPU</span>
  <span>VRAM</span><span>Swap</span><span></span>
</div>

<div id="exchange-list">
  <div id="loading">Chargement...</div>
  <div id="empty">Aucun échange enregistré.</div>
</div>

<script>
const REFRESH = 30;
let data = [];
let filter = '';
let expanded = new Set();
let countdown = REFRESH;
let timerHandle = null;

// ── Fetch ────────────────────────────────────────────────────────────────────

async function fetchExchanges() {
  try {
    const url = filter ? `/api/exchanges?limit=200&persona=${filter}` : '/api/exchanges?limit=200';
    const res = await fetch(url);
    if (!res.ok) return;
    data = await res.json();
    render();
    resetCountdown();
    document.getElementById('count-badge').textContent = data.length + ' échanges';
  } catch(e) {
    console.error('fetch error', e);
  }
}

function manualRefresh() {
  fetchExchanges();
}

function resetCountdown() {
  countdown = REFRESH;
  updateCountdown();
}

function updateCountdown() {
  document.getElementById('countdown').textContent = countdown + 's';
}

function startTimer() {
  if (timerHandle) clearInterval(timerHandle);
  timerHandle = setInterval(() => {
    countdown--;
    updateCountdown();
    if (countdown <= 0) fetchExchanges();
  }, 1000);
}

// ── Filter ───────────────────────────────────────────────────────────────────

function setFilter(p) {
  filter = p;
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.persona === p);
  });
  expanded.clear();
  fetchExchanges();
}

// ── Toggle detail ─────────────────────────────────────────────────────────────

function toggle(id) {
  const row    = document.getElementById('r-' + id);
  const detail = document.getElementById('d-' + id);
  if (!row || !detail) return;

  if (expanded.has(id)) {
    expanded.delete(id);
    row.classList.remove('expanded');
    detail.classList.remove('open');
  } else {
    expanded.add(id);
    row.classList.add('expanded');
    if (!detail.dataset.rendered) {
      const ex = data.find(e => e.id === id);
      detail.innerHTML = buildDetail(ex);
      detail.dataset.rendered = '1';
    }
    detail.classList.add('open');
  }
}

function toggleSys(id) {
  const body = document.getElementById('sys-' + id);
  const btn  = document.getElementById('sysb-' + id);
  if (!body) return;
  const vis = body.classList.toggle('visible');
  btn.textContent = vis ? 'masquer' : 'afficher';
}

// ── Render list ───────────────────────────────────────────────────────────────

function render() {
  const list = document.getElementById('exchange-list');
  const loading = document.getElementById('loading');
  const empty   = document.getElementById('empty');

  loading.style.display = 'none';
  empty.style.display = data.length === 0 ? 'block' : 'none';

  // Remove old rows (keep loading/empty placeholders)
  list.querySelectorAll('.ex-row, .ex-detail').forEach(el => el.remove());

  data.forEach(ex => {
    // Row
    const row = document.createElement('div');
    row.className = 'ex-row' + (expanded.has(ex.id) ? ' expanded' : '');
    row.id = 'r-' + ex.id;
    row.onclick = () => toggle(ex.id);
    row.innerHTML = buildRow(ex);
    list.appendChild(row);

    // Detail (always present, toggled via class)
    const detail = document.createElement('div');
    detail.className = 'ex-detail' + (expanded.has(ex.id) ? ' open' : '');
    detail.id = 'd-' + ex.id;
    if (expanded.has(ex.id)) {
      detail.innerHTML = buildDetail(ex);
      detail.dataset.rendered = '1';
    }
    list.appendChild(detail);
  });
}

// ── Row ───────────────────────────────────────────────────────────────────────

function buildRow(ex) {
  const persona = (ex.persona || '').toLowerCase();
  const badgeCls = 'persona-badge persona-' + persona;

  const ts = ex.started_at ? fmtTime(ex.started_at) : '—';
  const dur = ex.duration_ms != null ? fmtDur(ex.duration_ms) : span('⏳','dot-pending');
  const toks = ex.tokens_per_sec != null ? ex.tokens_per_sec.toFixed(1) : span('—','na');
  const gpu  = fmtGpu(ex.hw_before, ex.hw_after);
  const vram = fmtVram(ex.hw_before, ex.hw_after);
  const swap = fmtSwap(ex.hw_before);
  const status = ex.ended_at != null ? span('●','dot-ok')
    : (Date.now()/1000 - ex.started_at > 120 ? span('●','dot-error') : span('●','dot-pending'));

  return `
    <span><span class="${badgeCls}">${ex.persona || '?'}</span></span>
    <span class="ex-time">${ts}</span>
    <span class="ex-model">${ex.model || '—'}</span>
    <span class="ex-dur">${dur}</span>
    <span class="ex-toks">${toks}</span>
    <span class="ex-gpu">${gpu}</span>
    <span class="ex-vram">${vram}</span>
    <span class="ex-swap">${swap}</span>
    <span class="ex-status">${status}</span>
  `;
}

function span(content, cls) {
  return `<span class="${cls}">${content}</span>`;
}

function fmtTime(unix) {
  const d = new Date(unix * 1000);
  return d.toLocaleTimeString('fr-FR', {hour:'2-digit',minute:'2-digit',second:'2-digit'});
}

function fmtDur(ms) {
  if (ms == null) return span('—','na');
  return ms >= 1000 ? (ms/1000).toFixed(1)+'s' : ms+'ms';
}

function fmtGpu(before, after) {
  const b = before?.gpu_util_pct;
  const a = after?.gpu_util_pct;
  if (b == null && a == null) return span('—','na');
  if (a == null) return `${b}%`;
  const cls = a > b ? 'val-up' : (a < b ? 'val-down' : 'val-same');
  return `${b}%<span class="arrow">→</span><span class="${cls}">${a}%</span>`;
}

function fmtVram(before, after) {
  const b = before?.vram_used_mb;
  const a = after?.vram_used_mb;
  if (b == null) return span('—','na');
  const gb = (mb) => (mb/1024).toFixed(1)+'G';
  if (a == null) return gb(b);
  return gb(a);
}

function fmtSwap(hw) {
  if (!hw?.swap_used_gb && hw?.swap_used_gb !== 0) return span('—','na');
  return hw.swap_used_gb.toFixed(1)+'G';
}

// ── Detail ────────────────────────────────────────────────────────────────────

function buildDetail(ex) {
  return `
    <div class="conv-panel">
      <div class="conv-label">Conversation</div>
      ${buildConversation(ex)}
    </div>
    <div class="stats-panel">
      ${buildStats(ex)}
    </div>
  `;
}

function buildConversation(ex) {
  const msgs = ex.request_messages || [];
  const response = ex.response;
  const allMsgs = [...msgs];

  // Append the final response if it's not already the last message
  if (response && response.role === 'assistant') {
    const last = allMsgs[allMsgs.length - 1];
    if (!last || last.role !== 'assistant' || last.content !== response.content) {
      allMsgs.push(response);
    }
  }

  if (allMsgs.length === 0) return '<span class="na">Aucun message.</span>';
  return allMsgs.map((m, i) => buildMsg(m, i, ex.id)).join('');
}

function buildMsg(msg, idx, exId) {
  const role = msg.role || 'unknown';
  const content = msg.content || '';
  const toolCalls = msg.tool_calls || [];

  if (role === 'system') {
    const uid = exId + '_' + idx;
    const preview = esc(content.slice(0, 80)) + (content.length > 80 ? '…' : '');
    return `
      <div class="msg msg-system">
        <div class="msg-role">System
          <button class="sys-toggle" id="sysb-${uid}" onclick="event.stopPropagation();toggleSys('${uid}')">afficher</button>
        </div>
        <div class="msg-content">${preview}</div>
        <div class="sys-body" id="sys-${uid}">
          <div class="msg-content">${esc(content)}</div>
        </div>
      </div>`;
  }

  if (role === 'user') {
    return `
      <div class="msg msg-user">
        <div class="msg-role">Utilisateur</div>
        <div class="msg-content">${esc(content)}</div>
      </div>`;
  }

  if (role === 'assistant') {
    if (toolCalls.length > 0) {
      const tcHtml = toolCalls.map(tc => {
        const fn = tc?.function || {};
        const args = typeof fn.arguments === 'object'
          ? JSON.stringify(fn.arguments, null, 2)
          : (fn.arguments || '{}');
        return `<div class="tool-call-entry">
          <span class="tc-name">⚙ ${esc(fn.name || '?')}</span>
          <span class="tc-args">${esc(args)}</span>
        </div>`;
      }).join('');
      return `
        <div class="msg msg-tool-call">
          <div class="msg-role">Assistant → Outil</div>
          ${content ? `<div class="msg-content">${esc(content)}</div>` : ''}
          ${tcHtml}
        </div>`;
    }
    return `
      <div class="msg msg-assistant">
        <div class="msg-role">Assistant</div>
        <div class="msg-content">${esc(content)}</div>
      </div>`;
  }

  if (role === 'tool') {
    const truncated = content.length > 400 ? content.slice(0, 400) + '\n… (tronqué)' : content;
    return `
      <div class="msg msg-tool">
        <div class="msg-role">Outil → Résultat</div>
        <div class="msg-content tool-content">${esc(truncated)}</div>
      </div>`;
  }

  return `
    <div class="msg">
      <div class="msg-role">${esc(role)}</div>
      <div class="msg-content">${esc(content)}</div>
    </div>`;
}

function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Stats panel ───────────────────────────────────────────────────────────────

function buildStats(ex) {
  const llmHtml = buildLlmStats(ex);
  const hwHtml  = buildHwStats(ex);
  return `
    <div class="stats-section">
      <div class="stats-title">Latence</div>
      ${llmHtml}
    </div>
    <div class="stats-section">
      <div class="stats-title">Hardware</div>
      ${hwHtml}
    </div>`;
}

function buildLlmStats(ex) {
  const rows = [
    ['Durée totale',    ex.duration_ms   != null ? fmtDur(ex.duration_ms)        : '—'],
    ['Load model',      ex.load_duration_ms != null ? fmtDur(ex.load_duration_ms) : '—'],
    ['Prompt',          ex.prompt_tokens  != null ? ex.prompt_tokens + ' tok'     : '—'],
    ['Complétion',      ex.completion_tokens != null ? ex.completion_tokens + ' tok' : '—'],
    ['Vitesse',         ex.tokens_per_sec != null ? ex.tokens_per_sec.toFixed(1) + ' tok/s' : '—'],
  ];
  return rows.map(([label, val]) => `
    <div class="stat-row">
      <span class="stat-label">${label}</span>
      <span class="stat-value ${label==='Vitesse'?'highlight':''}">${val}</span>
    </div>`).join('');
}

function buildHwStats(ex) {
  const b = ex.hw_before || {};
  const a = ex.hw_after  || {};

  const hasGpu = b.gpu_util_pct != null || a.gpu_util_pct != null;

  let html = `
    <div class="hw-grid">
      <div class="hw-header"></div>
      <div class="hw-header">Avant</div>
      <div class="hw-header">Après</div>`;

  if (hasGpu) {
    html += hwRow('GPU util',
      b.gpu_util_pct != null ? b.gpu_util_pct + '%' : '—',
      a.gpu_util_pct != null ? a.gpu_util_pct + '%' : '—',
      b.gpu_util_pct, a.gpu_util_pct);
    const bv = b.vram_used_mb != null ? (b.vram_used_mb/1024).toFixed(1)+'G' : '—';
    const av = a.vram_used_mb != null ? (a.vram_used_mb/1024).toFixed(1)+'G' : '—';
    html += hwRow('VRAM', bv, av, b.vram_used_mb, a.vram_used_mb);
  }

  const bs = b.swap_used_gb != null ? b.swap_used_gb.toFixed(1)+'G' : '—';
  const as_ = a.swap_used_gb != null ? a.swap_used_gb.toFixed(1)+'G' : '—';
  html += hwRow('Swap', bs, as_, b.swap_used_gb, a.swap_used_gb);

  if (!hasGpu) {
    html += `<div class="hw-label" style="color:var(--muted-2);font-size:10px;grid-column:1/-1;padding-top:4px">GPU non disponible</div>`;
  }

  html += '</div>';
  return html;
}

function hwRow(label, bStr, aStr, bNum, aNum) {
  let aCls = '';
  if (bNum != null && aNum != null) {
    aCls = aNum > bNum ? 'val-up' : (aNum < bNum ? 'val-down' : 'val-same');
  }
  return `
    <div class="hw-label">${label}</div>
    <div class="hw-val">${bStr}</div>
    <div class="hw-val ${aCls}">${aStr}</div>`;
}

// ── Init ─────────────────────────────────────────────────────────────────────
fetchExchanges();
startTimer();
</script>
</body>
</html>
