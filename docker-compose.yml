version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# ASMO Personas — Docker Compose
#
# Build context is always the project root so each Dockerfile can COPY
# the shared commons/ directory.
#
# Ollama is assumed to run on the host at localhost:11434.
# The extra_hosts entry maps host.docker.internal → host gateway on Linux.
# ─────────────────────────────────────────────────────────────────────────────

x-common: &common
  restart: unless-stopped
  dns:
    - 8.8.8.8
    - 8.8.4.4
  extra_hosts:
    - "host.docker.internal:host-gateway"
  environment:
    ASMO_OLLAMA_BASE_URL: "${ASMO_OLLAMA_BASE_URL:-http://host.docker.internal:11434}"
    ASMO_OLLAMA_MODEL: "${ASMO_OLLAMA_MODEL:-ministral-3:14b}"
    ASMO_REDIS_URL: "redis://redis:6379"
    ASMO_LOG_LEVEL: "${ASMO_LOG_LEVEL:-INFO}"
    ASMO_LOG_JSON: "${ASMO_LOG_JSON:-true}"

services:
  # ── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FEMTO ─────────────────────────────────────────────────────────────────
  femto:
    <<: *common
    build:
      context: .
      dockerfile: femto/Dockerfile
    environment:
      ASMO_OLLAMA_BASE_URL: "${ASMO_OLLAMA_BASE_URL:-http://host.docker.internal:11434}"
      FEMTO_OLLAMA_MODEL: "${FEMTO_OLLAMA_MODEL:-ministral-3:14b}"
      ASMO_REDIS_URL: "redis://redis:6379"
      ASMO_LOG_LEVEL: "${ASMO_LOG_LEVEL:-INFO}"
      ASMO_LOG_JSON: "${ASMO_LOG_JSON:-true}"
      FEMTO_DISCORD_TOKEN: "${FEMTO_DISCORD_TOKEN}"
      FEMTO_REPORT_CHANNEL_ID: "${FEMTO_REPORT_CHANNEL_ID:-}"
      FEMTO_CHAT_CHANNEL_ID: "${FEMTO_CHAT_CHANNEL_ID:-}"
      FEMTO_METRICS_FILE: "/data/metrics.json"
      FEMTO_CMD_TIMEOUT: "${FEMTO_CMD_TIMEOUT:-10}"
      FEMTO_NAS_DEVICE: "${FEMTO_NAS_DEVICE:-/dev/sda}"
      FEMTO_NAS_SMART_TYPE: "${FEMTO_NAS_SMART_TYPE:-sat}"
    cap_add:
      - SYS_RAWIO           # required for smartctl raw disk access
    devices:
      - /dev/sda:/dev/sda   # SMART monitoring access
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - femto_data:/data
      - /mnt/nas:/mnt/nas:ro
      # Note: /proc/meminfo, /proc/uptime, /proc/loadavg already reflect HOST
      # values inside Docker on Linux — no bind mount needed.
      # Mounting /proc:/proc:ro would break container DNS resolution.
    # pid: host   # Uncomment for full host-level process visibility
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── ALITA ─────────────────────────────────────────────────────────────────
  alita:
    <<: *common
    build:
      context: .
      dockerfile: alita/Dockerfile
    container_name: asmo-alita
    environment:
      ASMO_OLLAMA_BASE_URL: "${ASMO_OLLAMA_BASE_URL:-http://host.docker.internal:11434}"
      ASMO_REDIS_URL: "redis://redis:6379"
      ASMO_LOG_LEVEL: "${ASMO_LOG_LEVEL:-INFO}"
      ASMO_LOG_JSON: "${ASMO_LOG_JSON:-true}"
      # Discord
      ALITA_DISCORD_TOKEN: "${ALITA_DISCORD_TOKEN}"
      ALITA_DISCORD_CHANNEL_ID: "${ALITA_DISCORD_CHANNEL_ID:-}"
      ALITA_BRIEFING_CHANNEL_ID: "${ALITA_BRIEFING_CHANNEL_ID:-}"
      ALITA_BRIEFING_HOUR: "${ALITA_BRIEFING_HOUR:-7}"
      ALITA_BRIEFING_WEEKDAYS_ONLY: "${ALITA_BRIEFING_WEEKDAYS_ONLY:-true}"
      # LLM
      ALITA_OLLAMA_MODEL: "${ALITA_OLLAMA_MODEL:-ministral-3:14b}"
      # Weather
      ALITA_WEATHER_API_KEY: "${ALITA_WEATHER_API_KEY:-}"
      ALITA_WEATHER_CITY: "${ALITA_WEATHER_CITY:-Marseille,FR}"
      # Stocks
      ALITA_PORTFOLIO: "${ALITA_PORTFOLIO:-[]}"
      # Home Assistant
      ALITA_HA_URL: "${ALITA_HA_URL:-http://homeassistant:8123}"
      ALITA_HA_TOKEN: "${ALITA_HA_TOKEN:-}"
      # Spotify
      ALITA_SPOTIFY_CLIENT_ID: "${ALITA_SPOTIFY_CLIENT_ID:-}"
      ALITA_SPOTIFY_CLIENT_SECRET: "${ALITA_SPOTIFY_CLIENT_SECRET:-}"
      ALITA_SPOTIFY_REDIRECT_URI: "${ALITA_SPOTIFY_REDIRECT_URI:-http://localhost:8888/spotify/callback}"
      ALITA_SPOTIFY_PORT: "${ALITA_SPOTIFY_PORT:-8888}"
      # SearXNG
      ALITA_SEARXNG_URL: "${ALITA_SEARXNG_URL:-http://searxng:8080}"
      # Database
      ALITA_DB_PATH: "/data/alita.db"
      # Long-term memory (RAG)
      ALITA_EMBED_MODEL: "${ALITA_EMBED_MODEL:-nomic-embed-text}"
      # Anytype self-hosted (notes & project tracking)
      ALITA_ANYTYPE_URL: "${ALITA_ANYTYPE_URL:-http://host.docker.internal:31013}"
      ALITA_ANYTYPE_API_KEY: "${ALITA_ANYTYPE_API_KEY:-}"
      ALITA_ANYTYPE_SPACE_ID: "${ALITA_ANYTYPE_SPACE_ID:-}"
    volumes:
      - alita_data:/data
    ports:
      - "127.0.0.1:8888:8888"   # Spotify OAuth callback (local only)
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── GIORGIO ───────────────────────────────────────────────────────────────
  giorgio:
    <<: *common
    build:
      context: .
      dockerfile: giorgio/Dockerfile
    environment:
      ASMO_OLLAMA_BASE_URL: "${ASMO_OLLAMA_BASE_URL:-http://host.docker.internal:11434}"
      GIORGIO_OLLAMA_MODEL: "${GIORGIO_OLLAMA_MODEL:-ministral-3:8b}"
      ASMO_REDIS_URL: "redis://redis:6379"
      ASMO_LOG_LEVEL: "${ASMO_LOG_LEVEL:-INFO}"
      ASMO_LOG_JSON: "${ASMO_LOG_JSON:-true}"
      GIORGIO_DISCORD_TOKEN: "${GIORGIO_DISCORD_TOKEN}"
      GIORGIO_CHANNEL_ID: "${GIORGIO_CHANNEL_ID}"
      GIORGIO_RECOMMENDATION_CHANNEL_ID: "${GIORGIO_RECOMMENDATION_CHANNEL_ID:-}"
      GIORGIO_JELLYFIN_URL: "${GIORGIO_JELLYFIN_URL:-}"
      GIORGIO_JELLYFIN_API_KEY: "${GIORGIO_JELLYFIN_API_KEY:-}"
      GIORGIO_JELLYFIN_USER_ID: "${GIORGIO_JELLYFIN_USER_ID:-}"
      GIORGIO_SYNC_INTERVAL_HOURS: "${GIORGIO_SYNC_INTERVAL_HOURS:-6}"
      GIORGIO_DB_HOST: "${GIORGIO_DB_HOST:-giorgio-db}"
      GIORGIO_DB_PORT: "${GIORGIO_DB_PORT:-3306}"
      GIORGIO_DB_NAME: "${GIORGIO_DB_NAME:-giorgio}"
      GIORGIO_DB_USER: "${GIORGIO_DB_USER:-giorgio}"
      GIORGIO_DB_PASSWORD: "${GIORGIO_DB_PASSWORD}"
      GIORGIO_SEARXNG_URL: "${GIORGIO_SEARXNG_URL:-http://searxng:8080}"
      GIORGIO_EMBED_MODEL: "${GIORGIO_EMBED_MODEL:-nomic-embed-text}"
      GIORGIO_API_PORT: "${GIORGIO_API_PORT:-5555}"
      GIORGIO_NOTIFICATION_USERS: "${GIORGIO_NOTIFICATION_USERS:-asmo}"
    ports:
      - "5555:5555"
    networks:
      - default
      - giorgio_db
    depends_on:
      redis:
        condition: service_healthy

volumes:
  redis_data:
  femto_data:
  alita_data:

networks:
  # Attach Giorgio to the existing MariaDB network without migrating data
  giorgio_db:
    external: true
    name: giorgio_giorgio-network
